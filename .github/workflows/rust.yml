name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  # Correctness checks run on the host toolchain/architecture. The crypto and PAM
  # logic is architecture-independent, so these do not need to run as arm64e.
  check:
    runs-on: macos-15
    steps:
    - uses: actions/checkout@v4
    - name: Format check
      run: cargo fmt --check
    - name: Build
      run: cargo build --verbose
    - name: Test
      run: cargo test --verbose
    - name: Clippy check
      run: cargo clippy --no-deps

  # The shippable artifact is a thin arm64e dylib, which requires a nightly toolchain
  # plus -Zbuild-std (arm64e-apple-darwin is a tier-3 target with no prebuilt std).
  arm64e-module:
    runs-on: macos-15
    steps:
    - uses: actions/checkout@v4
    - name: Install nightly + rust-src
      run: rustup toolchain install nightly --profile minimal --component rust-src
    - name: Build arm64e PAM module
      run: rustup run nightly cargo build -Z build-std=std --release --target arm64e-apple-darwin
    - name: Inspect artifact
      run: |
        DY=target/arm64e-apple-darwin/release/libpam_ssh_agent.dylib
        file "$DY"
        otool -L "$DY" | grep -i pam
        nm -gU "$DY" | grep pam_sm
