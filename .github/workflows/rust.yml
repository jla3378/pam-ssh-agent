name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  # Correctness checks run on the host toolchain/architecture. The crypto and PAM
  # logic is architecture-independent, so these do not need to run as arm64e.
  check:
    runs-on: macos-15
    steps:
    - uses: actions/checkout@v4
    - uses: Swatinem/rust-cache@v2
    - name: Format check
      run: cargo fmt --check
    - name: Build
      run: cargo build --verbose
    - name: Test
      run: cargo test --verbose
    - name: Clippy check
      run: cargo clippy --no-deps

  # The shippable artifact is a thin arm64e dylib, which requires a nightly toolchain
  # plus -Zbuild-std (arm64e-apple-darwin is a tier-3 target with no prebuilt std).
  arm64e-module:
    runs-on: macos-15
    steps:
    - uses: actions/checkout@v4
    - name: Install nightly + rust-src
      run: rustup toolchain install nightly --profile minimal --component rust-src
    - uses: Swatinem/rust-cache@v2
      with:
        key: arm64e-build-std
    - name: Build arm64e PAM module
      # `make pam` builds with build-std, then realigns the LINKEDIT string table so the
      # dylib loads on macOS 26+ dyld (see scripts/realign-linkedit.py / AUDIT.md).
      run: make pam
    - name: Inspect artifact
      run: |
        DY=target/arm64e-apple-darwin/release/libpam_ssh_agent.dylib
        file "$DY"
        otool -L "$DY" | grep -i pam
        nm -gU "$DY" | grep pam_sm
        # Confirm the realign workaround held: the LC_SYMTAB string table must be 8-aligned
        # or macOS 26+ dyld will refuse to load the module.
        stroff=$(otool -l "$DY" | awk '/LC_SYMTAB/{f=1} f&&/stroff/{print $2; exit}')
        echo "string table offset: $stroff"
        test $(( stroff % 8 )) -eq 0 || { echo "ERROR: string table mis-aligned"; exit 1; }
